services:
  # Database
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pipesim_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: pipesim_redis
    ports:
      - "6379:6379"
    restart: always

  # API
  api:
    build: .
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      # [IMPORTANT] Override the database URL
      # These is no localhost (127.0.0.1) inside the Docker network. The API should knock on the 'db' service name
      - DATABASE_URL=postgresql+asyncpg://user:password@db:5432/pipesim_db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    
# Save database settings on hard disk, so that they don't disappear when restarting
volumes:
  postgres_data: