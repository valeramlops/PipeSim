name: API Tests

# When start this script
on:
  push:
    branches: ["main"] # Each push in main branch
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest # Up virtual server on Linux

    steps:
    # 1. Download code from repository
    - name: Checkout code
      uses: actions/checkout@v4
    
    # 2. Install Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    # 3. Install libraries
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Start tests
    - name: Run Pytest
      env:
        DATABASE_URL: "postgresql+asyncpg://user:password@localhost:5432/test_db"
      run: |
        pytest -v

