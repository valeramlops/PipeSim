name: API Tests

# When start this script
on:
  push:
    branches: ["main"] # Each push in main branch
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest # Up virtual server on Linux

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        # Waiting db start
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:alpine
        ports:
          - 6379:6379

    steps:
    # Download code from repo
    - name: Checkout code
      uses: actions/checkout@v4

    # Install Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    # Install uv
    - name: Install uv
      run: pip install uv

    # Install libraries
    - name: Install dependencies
      run: |
        uv pip install --system -r requirements.txt
        uv pip install --system pytest httpx pytest-asyncio

    # Start tests
    - name: Run Pytest
      env:
        DATABASE_URL: "postgresql+asyncpg://user:password@localhost:5432/test_db"
        REDIS_URL: "redis://localhost:6379/0"
      run: |
        pytest -v